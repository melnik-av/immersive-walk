<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            max-width: 800px; 
            margin: 0 auto; 
            padding: 20px; 
            background: #1a1a2e; 
            color: white; 
            min-height: 100vh;
        }
        h1 { margin-top: 0; }
        input, textarea, button { 
            padding: 12px; 
            margin: 8px 0; 
            width: 100%; 
            box-sizing: border-box; 
            border-radius: 8px; 
            border: none; 
            font-size: 16px;
            font-family: inherit;
        }
        input, textarea { 
            background: rgba(255,255,255,0.1); 
            color: white; 
        }
        input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.5); }
        textarea { 
            resize: vertical; 
            min-height: 80px; 
        }
        button { 
            background: #e94560; 
            color: white; 
            cursor: pointer; 
            font-weight: 600; 
            transition: background 0.2s;
        }
        button:hover { background: #d63851; }
        button:disabled { background: #4a4a5a; cursor: not-allowed; }
        #status { 
            margin-top: 20px; 
            padding: 15px; 
            background: rgba(255,255,255,0.1); 
            border-radius: 8px; 
            min-height: 20px; 
        }
        .hidden { display: none !important; }
        .user-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .user-email {
            font-size: 14px;
            color: #a0a0b0;
        }
        .logout-btn {
            background: #666;
            width: auto;
            padding: 8px 16px;
            font-size: 14px;
            margin: 0;
        }
        .logout-btn:hover { background: #555; }
        .track-item {
            padding: 20px; 
            background: rgba(255,255,255,0.05); 
            margin: 15px 0; 
            border-radius: 12px;
        }
        .track-title { 
            font-weight: 600; 
            font-size: 18px;
            margin-bottom: 8px; 
        }
        .track-description {
            font-size: 14px;
            color: #a0a0b0;
            margin-bottom: 8px;
            font-style: italic;
            line-height: 1.5;
        }
        .track-meta { 
            font-size: 14px; 
            color: #6c6c7d;
            margin-bottom: 8px;
        }
        .track-link { 
            font-size: 12px; 
            color: #6c6c7d; 
            word-break: break-all;
            font-family: monospace;
            margin-bottom: 15px;
        }
        .track-actions { 
            display: flex; 
            gap: 10px; 
            flex-wrap: wrap;
            margin-top: 15px;
        }
        .track-actions button {
            flex: 1;
            min-width: 120px;
        }
        .btn-copy { background: #4CAF50; }
        .btn-copy:hover { background: #45a049; }
        .btn-delete { background: #8b0000; }
        .btn-delete:hover { background: #a00000; }
        .field-label {
            font-size: 14px;
            color: #a0a0b0;
            margin-bottom: 5px;
            display: block;
        }
        
        /* Стили для QR-кода */
        .qr-section {
            margin: 20px 0;
            padding: 20px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .qr-label {
            font-size: 13px;
            color: #a0a0b0;
            margin-bottom: 15px;
            text-align: center;
        }
        .qr-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .qr-code-container {
            background: white;
            padding: 15px;
            border-radius: 12px;
            display: inline-block;
        }
        .qr-code-container img {
            display: block;
            width: 150px;
            height: 150px;
        }
        .qr-actions {
            display: flex;
            gap: 10px;
            flex-direction: column;
            min-width: 180px;
        }
        .qr-actions button {
            width: 100%;
        }
        .btn-qr-download { background: #2196F3; }
        .btn-qr-download:hover { background: #1976D2; }
    </style>
</head>
<body>
    <h1>️ Админ-панель</h1>
    
    <div id="loginForm">
        <h2>Вход</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Пароль">
        <button onclick="login()">Войти</button>
        <div id="loginError" style="color: #e94560; margin-top: 10px;"></div>
    </div>
    
    <div id="adminPanel" class="hidden">
        <div class="user-info">
            <div>
                <div style="font-weight: 600;">Вы вошли как:</div>
                <div class="user-email" id="userEmail">—</div>
            </div>
            <button class="logout-btn" onclick="logout()">Выйти</button>
        </div>
        
        <h2>Добавить трек</h2>
        
        <label class="field-label">Название трека *</label>
        <input type="text" id="title" placeholder="Например: Прогулка по старому городу">
        
        <label class="field-label">Описание (аннотация)</label>
        <textarea id="description" placeholder="2-3 предложения о прогулке..."></textarea>
        
        <label class="field-label">Цена (руб)</label>
        <input type="number" id="price" placeholder="500" value="500">
        
        <label class="field-label">Дней доступа</label>
        <input type="number" id="days" placeholder="7" value="7">
        
        <label class="field-label">Аудиофайл (MP3) *</label>
        <input type="file" id="mp3file" accept="audio/mp3,audio/mpeg">
        
        <button onclick="uploadTrack()" id="uploadBtn">Загрузить трек</button>
        <div id="status"></div>
        
        <h2 style="margin-top: 40px;">Список треков</h2>
        <div id="tracksList"></div>
    </div>

    <script type="module">
        import { supabase } from './supabase-config.js';

        // Вход
        window.login = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('loginError');
            errorEl.textContent = '';
            
            const { error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) {
                errorEl.textContent = ' ' + error.message;
            }
        };

        // Выход
        window.logout = async () => {
            const { error } = await supabase.auth.signOut();
            if (error) {
                alert('Ошибка выхода: ' + error.message);
            }
        };

        // Отслеживание авторизации
        supabase.auth.onAuthStateChange((event, session) => {
            if (session && session.user) {
                document.getElementById('loginForm').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
                document.getElementById('userEmail').textContent = session.user.email;
                loadTracks();
            } else {
                document.getElementById('loginForm').classList.remove('hidden');
                document.getElementById('adminPanel').classList.add('hidden');
            }
        });

        // Функция генерации URL QR-кода через внешний API
        function getQRUrl(text, size = 200) {
            return `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encodeURIComponent(text)}&margin=10&color=000000&bgcolor=ffffff`;
        }

        // Загрузка списка треков
        async function loadTracks() {
            const { data: tracks, error } = await supabase
                .from('tracks')
                .select('*')
                .order('created_at', { ascending: false });
            
            if (error) {
                console.error('Ошибка загрузки:', error);
                return;
            }
            
            const list = document.getElementById('tracksList');
            if (!tracks || tracks.length === 0) {
                list.innerHTML = '<div style="color: #a0a0b0;">Нет треков</div>';
                return;
            }
            
            const playerUrl = window.location.origin + window.location.pathname.replace('admin.html', 'index.html');
            
            list.innerHTML = tracks.map(t => {
                const trackLink = `${playerUrl}?track=${t.id}`;
                const descriptionHtml = t.description 
                    ? `<div class="track-description">"${t.description}"</div>` 
                    : '';
                const qrUrl = getQRUrl(trackLink, 200);
                
                return `
                    <div class="track-item">
                        <div class="track-title">${t.title}</div>
                        ${descriptionHtml}
                        <div class="track-meta">${t.price} руб, ${t.duration_days} дней</div>
                        <div class="track-link">${trackLink}</div>
                        
                        <div class="qr-section">
                            <div class="qr-label">📱 QR-код для быстрого доступа</div>
                            <div class="qr-wrapper">
                                <div class="qr-code-container">
                                    <img src="${qrUrl}" alt="QR-код" id="qr-img-${t.id}" crossorigin="anonymous">
                                </div>
                                <div class="qr-actions">
                                    <button class="btn-qr-download" onclick="downloadQR('${qrUrl}', '${t.title.replace(/'/g, "\\'")}')">
                                         Скачать QR
                                    </button>
                                    <button class="btn-copy" onclick="copyLink('${trackLink}', '${t.title.replace(/'/g, "\\'")}')">
                                        📋 Копировать ссылку
                                    </button>
                                </div>
                            </div>
                        </div>
                        
                        <div class="track-actions">
                            <button onclick="toggleTrack('${t.id}', ${!t.active})">
                                ${t.active ? 'Отключить' : 'Включить'}
                            </button>
                            <button class="btn-delete" onclick="deleteTrack('${t.id}')">Удалить</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Копирование ссылки
        window.copyLink = async (link, title) => {
            try {
                await navigator.clipboard.writeText(link);
                
                const status = document.getElementById('status');
                status.textContent = `✅ Ссылка на "${title}" скопирована!`;
                status.style.background = 'rgba(76, 175, 80, 0.2)';
                
                setTimeout(() => {
                    status.textContent = '';
                    status.style.background = 'rgba(255,255,255,0.1)';
                }, 3000);
            } catch (err) {
                const textArea = document.createElement('textarea');
                textArea.value = link;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                
                alert('Ссылка скопирована!');
            }
        };

        // Скачать QR-код
        window.downloadQR = async (qrUrl, title) => {
            try {
                const response = await fetch(qrUrl);
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `QR-${title.replace(/[^a-z0-9а-яё]/gi, '_')}.png`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                window.URL.revokeObjectURL(url);
            } catch (error) {
                console.error('Ошибка скачивания:', error);
                // Fallback: открываем в новой вкладке
                window.open(qrUrl, '_blank');
            }
        };

        // Переключение активности
        window.toggleTrack = async (id, active) => {
            const { error } = await supabase
                .from('tracks')
                .update({ active })
                .eq('id', id);
            
            if (error) {
                alert('Ошибка: ' + error.message);
            } else {
                loadTracks();
            }
        };

        // Удаление трека
        window.deleteTrack = async (id) => {
            if (!confirm('Удалить этот трек?')) return;
            
            const { error } = await supabase
                .from('tracks')
                .delete()
                .eq('id', id);
            
            if (error) {
                alert('Ошибка удаления: ' + error.message);
            } else {
                loadTracks();
            }
        };

        // Загрузка трека
        window.uploadTrack = async () => {
            const status = document.getElementById('status');
            const uploadBtn = document.getElementById('uploadBtn');
            const title = document.getElementById('title').value.trim();
            const description = document.getElementById('description').value.trim();
            const price = parseInt(document.getElementById('price').value);
            const days = parseInt(document.getElementById('days').value);
            const file = document.getElementById('mp3file').files[0];

            if (!file || !title) { 
                alert('Заполните название и выберите файл'); 
                return; 
            }

            status.textContent = ' Загрузка файла...';
            uploadBtn.disabled = true;

            try {
                const fileName = `${Date.now()}_${Math.random().toString(36).substr(2, 9)}_${file.name.replace(/\s/g, '_').replace(/[^a-zA-Z0-9._-]/g, '')}`;
                console.log('📤 Загрузка файла:', fileName);
                
                const { error: uploadError, data } = await supabase.storage
                    .from('tracks')
                    .upload(fileName, file, {
                        cacheControl: '3600',
                        upsert: false
                    });
                
                if (uploadError) throw uploadError;

                const { data: { publicUrl } } = supabase.storage
                    .from('tracks')
                    .getPublicUrl(fileName);

                const { error: dbError, data: dbData } = await supabase
                    .from('tracks')
                    .insert({
                        title,
                        description: description || null,
                        price,
                        duration_days: days,
                        file_url: publicUrl,
                        active: true
                    })
                    .select();

                if (dbError) throw dbError;

                status.textContent = '✅ Трек добавлен!';
                document.getElementById('title').value = '';
                document.getElementById('description').value = '';
                document.getElementById('mp3file').value = '';
                loadTracks();
            } catch (e) {
                status.textContent = '❌ Ошибка: ' + e.message;
            } finally {
                uploadBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
