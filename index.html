<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Иммерсивная прогулка</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            padding: 20px;
        }
        .player {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            text-align: center;
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h1 { margin: 0 0 10px 0; font-size: 24px; font-weight: 600; }
        .icon { font-size: 64px; margin-bottom: 20px; display: block; }
        #status {
            margin: 20px 0;
            font-size: 16px;
            color: #a0a0b0;
            min-height: 24px;
            line-height: 1.4;
        }
        button {
            background: #e94560;
            color: white;
            border: none;
            padding: 18px 48px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        button:hover:not(:disabled) { background: #d63851; transform: translateY(-2px); }
        button:active:not(:disabled) { transform: translateY(0); }
        button:disabled {
            background: #4a4a5a;
            color: #888;
            cursor: not-allowed;
        }
        .hint {
            margin-top: 24px;
            font-size: 12px;
            color: #6c6c7d;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="player">
        <span class="icon">🎧</span>
        <h1 id="trackTitle">Загрузка...</h1>
        <div id="status">Инициализация...</div>
        <button id="playBtn" disabled>Загрузка...</button>
        <div class="hint">
            💡 <strong>Важно:</strong> Не блокируйте экран телефона во время прогулки.
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
